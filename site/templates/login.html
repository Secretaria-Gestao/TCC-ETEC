<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../static/css/login.css" />
    <link rel="stylesheet" href="../static/css/fonts.css" />
    <link rel="stylesheet" href="../static/css/global.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../static/js/supabase_config.js"></script>
    <script src="../static/js/login.js" defer></script>
    <script src="../static/js/validation.js" defer></script>

</head>

<body>
    <main>
        <form onsubmit="false"> 

            <h1 id="logando">Entrar na conta</h1><br>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" onchange="onChangeEmail()" placeholder="seu@email.com" />
            <div class="error" id="email-required-error">
                Email é obrigatório
            </div>
            <div class="error" id="email-invalid-error">
                Email é inválido
            </div>
            <br>
            <label for="password">Senha</label>
            <input type="password" name="password" id="password" onchange="onChangePassaword()" placeholder="sua senha" />
            <div class="error" id="password-required-error">
                Senha é obrigatória
            </div>

            <button type="button" class="clear " id="recover-password-button">
                Recuperar senha
            </button>


            <button type="submit" class="solid " id="login-button" onclick="login_EmailPassword(event)">
                Entrar
            </button>

            <button type="button" name="google" onclick="loginGoogle()" class="solid google"> <img src="https://cdn-icons-png.flaticon.com/256/2504/2504739.png" alt="Imagem Google" class="img_google">  Entrar com o google </button>

            <button type="button" id="btn_cadastrar" class="outline "> 
                Cadastrar-se
            </button>

        </form>
    </main>
</body>

</html>
