<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../static/css/login.css" />
    <link rel="stylesheet" href="../static/css/fonts.css" />
    <link rel="stylesheet" href="../static/css/global.css" />
    <script src="../static/js/validation.js" defer></script>
    <script src="../static/js/login.js" defer></script>
</head>

<body>
    <main>
        <form> 
            <h1>Login</h1><br>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" onchange="onChangeEmail()" placeholder="seu@email.com" />
            <div class="error" id="email-required-error">
                Email é obrigatório
            </div>
            <div class="error" id="email-invalid-error">
                Email é inválido
            </div>

            <label for="password">Senha</label>
            <input type="password" name="password" id="password" onchange="onChangePassaword()"
                placeholder="sua senha" />
            <div class="error" id="password-required-error">
                Senha é obrigatória
            </div>

            <button type="button" class="clear " id="recover-password-button">
                Recuperar senha
            </button>

            <button type="button" class="solid " id="login-button" onclick="login()">
                Entrar
            </button>

            <button type="button" onclick="google()" name="google" class="solid "> Entrar com o google </button>

            <button type="button" class="outline ">
                Registrar
            </button>

        </form>
    </main>
</body>

</html>
