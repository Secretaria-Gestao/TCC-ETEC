<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendamento</title>
    <link rel="stylesheet" href="../static/css/fonts.css" />
    <link rel="stylesheet" href="../static/css/global.css" />
    <link rel="stylesheet" href="../static/css/agentamento.css" />
    <script src="../static/js/agendamento.js" defer></script>
  </head>

  <body>
    <form onsubmit="return false">

        <main>
            <div class="card_1">

                <div class="lista_servicos" id="lista_servicos">
                    <div class="servico_adicionado">
                        <label for="servico">Selecione o serviço:</label>
                        <select name="servico" class="servico">
                            <option value="Barba">Barba</option>
                            <option value="Cabelo">Cabelo</option>
                            <option value="Hidratação capilar">Hidratação capilar</option>
                            <option value="Coloração">Coloração</option>
                            <option value="Manicure">manicure</option>
                        </select>
                        <button type="button" class="btn_servico" id="btn_add_servico" onclick="add_servico()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-plus-lg" viewBox="0 0 16 16">
                                <path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="profissional_selecionado">
                <label for="profissional">Selecione o(a) profissional: </label>

                <select name="profissional">
                    <option value="Roberto">Roberto</option>
                    <option value="Ronaldo">Ronaldo</option>
                    <option value="Rosalva">Rosalva</option>
                    <option value="Leila">Leila</option>
                </select>
                </div>

                <div>
                    <label>Horario da sessão:</label>
                    <input type="date" name="data" /></div>
                <div>
                    <label>Dia marcado:</label>
                    <input type="time" name="horario" />
                </div>
            </div>

            <div class="card_2">
                <div>
                        <select name="local" class="local">
                            <option value="">Local</option>
                            <option value="Local_Souza">Local_Souza</option>
                            <option value="Seu Jorge">Seu Jorge</option>
                            <option value="Unhas Cleide">Unhas Cleide</option>
                            <option value="Rua dos Bobos">Rua dos Bobos</option>
                            <option value="Casa Engraçada">Casa Engraçada</option>
                        </select>
                </div>

                <div class="div_btn">
                    <button id="btn-enviar" type="submit" class="enviar solid"> Enviar </button>
                    <button id="btn-resetar" type="reset" class="resetar solid"> Resetar </button>
                </div>
            </div>
        </main>
    </form>
  </body>
</html>
