<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendamento</title>
    <link rel="stylesheet" href="../static/css/fonts.css" />
    <link rel="stylesheet" href="../static/css/global.css" />
    <link rel="stylesheet" href="../static/css/agentamento.css" />
    <script src="../static/js/script.js" defer></script>
  </head>

  <body>
    <header>
        <h1>Bem vindo!</h1>
        <h1>Agendamento</h1>
    </header>
    
    <main>
        <form method="post" action="/fim">
            <label for="servico">Selecione o serviço:</label>

            <div id="lista_servicos">
            <button type="button" class="add_servico" id="add_servico">+</button>
            <select name="servico">
                <option value="Barba">Barba</option>
                <option value="Cabelo">Cabelo</option>
                <option value="Hidratação capilar">Hidratação capilar</option>
                <option value="Coloração">Coloração</option>
                <option value="Manicure">manicure</option>
            </select>
            </div>

            <div>
            <label for="profissional">Selecione o(a) profissional: </label>

            <select name="profissional">
                <option value="Roberto">Roberto</option>
                <option value="Ronaldo">Ronaldo</option>
                <option value="Rosalva">Rosalva</option>
                <option value="Leila">Leila</option>
            </select>
            </div>

            <div><label>Para que dia?</label><input type="date" name="data" /></div>

            <div>
            <label>Em que horas?</label><input type="time" name="horario" />
            </div>

            <div>
            <input type="submit" class="enviar" value="Enviar" />
            </div>

        </form>
    </main>
  </body>
</html>
