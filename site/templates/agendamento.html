<!doctype html>
<html lang="en">
  
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendamento</title>
    <link rel="stylesheet" href="../static/css/style.css" />
    <script src="../static/js/script.js"defer></script>
</head>

<body>
  <main>
    <h1>Bem vindo {{ dados.client_nome }}!</h1>
    <h1>Agendamento</h1>
    <br /><br />


    <form method="post" action="/fim">

      Selecione o serviço: <br>
      <div>
        <button type="button" id="add_servico">+</button>
        <select name="servico">
          <option value="Barba"> Barba </option>
          <option value="Cabelo"> Cabelo </option>
          <option value="Hidratação capilar"> Hidratação capilar </option>
          <option value="Coloração"> Coloração </option>
          <option value="Manicure"> manicure </option>
        </select>
      </div>
      <br><br>

      Selecione o(a) profissional: <br>
      <select name="profissional">
        <option value="Roberto"> Roberto </option>
        <option value="Ronaldo"> Ronaldo </option>
        <option value="Rosalva"> Rosalva </option>
        <option value="Leila"> Leila </option>
      </select>

      <input name="client_id" type="hidden" value="{{ client_id }}"><br><br>

      <label>Para que dia?</label><br><input type="date" name="data"><br><br>
      <label>Em que horas?</label><br><input type="time" name="horario"><br>
      <br>

      <input type="submit" value="Enviar" />

    </form>
  </main>

  <footer>
    &copy;
  </footer>
</body>
</html>
